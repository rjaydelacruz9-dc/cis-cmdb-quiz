<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIS – CMDB Data Foundation · Practice Quiz</title>
<style>
  :root{
    --bg:#0f172a; --panel:#1e293b; --panel2:#243449; --text:#e2e8f0; --muted:#94a3b8;
    --accent:#38bdf8; --accent2:#0ea5e9; --green:#22c55e; --greenbg:#14361f; --red:#ef4444;
    --redbg:#3a1519; --amber:#f59e0b; --border:#334155; --radius:14px;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(160deg,#0b1220,#0f172a 40%,#111c30);color:var(--text);min-height:100vh;line-height:1.5}
  .wrap{max-width:820px;margin:0 auto;padding:24px 18px 80px}
  h1{font-size:1.5rem;margin:0 0 4px}
  .sub{color:var(--muted);font-size:.92rem;margin-bottom:22px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:18px;
    box-shadow:0 10px 30px rgba(0,0,0,.25)}
  .btn{background:var(--accent2);color:#04222f;border:none;border-radius:10px;padding:11px 20px;font-size:.95rem;
    font-weight:650;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:8px}
  .btn:hover{background:var(--accent);transform:translateY(-1px)}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
  .btn.ghost{background:transparent;color:var(--text);border:1px solid var(--border)}
  .btn.ghost:hover{background:var(--panel2)}
  .btn.wide{width:100%;justify-content:center;padding:14px}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .spacer{flex:1}
  label.opt{display:flex;gap:12px;align-items:flex-start;background:var(--panel2);border:1.5px solid var(--border);
    border-radius:11px;padding:13px 15px;margin:9px 0;cursor:pointer;transition:.12s}
  label.opt:hover{border-color:var(--accent2)}
  label.opt.sel{border-color:var(--accent);background:#1c3346}
  label.opt.correct{border-color:var(--green);background:var(--greenbg)}
  label.opt.wrong{border-color:var(--red);background:var(--redbg)}
  label.opt input{margin-top:3px;accent-color:var(--accent);transform:scale(1.15)}
  .optltr{font-weight:700;color:var(--muted);min-width:18px}
  .qtext{font-size:1.08rem;font-weight:600;margin:6px 0 14px}
  .tag{display:inline-block;background:var(--panel2);color:var(--accent);font-size:.72rem;font-weight:600;
    padding:3px 10px;border-radius:20px;border:1px solid var(--border);text-transform:uppercase;letter-spacing:.03em}
  .tag.multi{color:var(--amber)}
  .tag.match{color:#c084fc}
  .progress{height:8px;background:var(--panel2);border-radius:20px;overflow:hidden;margin:14px 0}
  .progress>div{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));width:0;transition:width .3s}
  .meta{display:flex;justify-content:space-between;align-items:center;font-size:.85rem;color:var(--muted);margin-bottom:4px}
  .feedback{border-radius:11px;padding:13px 15px;margin:12px 0;font-size:.92rem;display:none}
  .feedback.show{display:block}
  .feedback.ok{background:var(--greenbg);border:1px solid var(--green)}
  .feedback.no{background:var(--redbg);border:1px solid var(--red)}
  .feedback b{display:block;margin-bottom:3px}
  .note{font-size:.83rem;color:var(--amber);margin-top:8px;padding:8px 11px;background:#2a220f;border-radius:8px;
    border:1px solid #4a3a12}
  select.match{background:var(--panel2);color:var(--text);border:1.5px solid var(--border);border-radius:8px;
    padding:8px 10px;font-size:.9rem;width:100%;margin-top:6px}
  .matchrow{margin:11px 0;padding:11px 13px;background:var(--panel2);border-radius:10px;border:1.5px solid var(--border)}
  .matchrow.correct{border-color:var(--green);background:var(--greenbg)}
  .matchrow.wrong{border-color:var(--red);background:var(--redbg)}
  .matchrow .left{font-weight:600;font-size:.95rem}
  .matchans{font-size:.85rem;margin-top:6px;color:var(--muted)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .stat{background:var(--panel2);border-radius:11px;padding:16px;text-align:center}
  .stat .n{font-size:2rem;font-weight:750}
  .stat .l{font-size:.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .stat.g .n{color:var(--green)} .stat.r .n{color:var(--red)}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
  .chip{font-size:.82rem;padding:7px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--panel2);
    cursor:pointer;user-select:none;transition:.12s}
  .chip.on{background:#1c3346;border-color:var(--accent);color:var(--accent)}
  .field{margin:14px 0}
  .field label{display:block;font-size:.85rem;color:var(--muted);margin-bottom:7px;font-weight:600}
  .toggle{display:flex;align-items:center;gap:9px;font-size:.9rem;cursor:pointer;padding:6px 0}
  .toggle input{transform:scale(1.2);accent-color:var(--accent)}
  input[type=number]{background:var(--panel2);color:var(--text);border:1.5px solid var(--border);border-radius:8px;
    padding:9px 11px;font-size:.9rem;width:110px}
  .flagbtn{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:6px 11px;
    cursor:pointer;font-size:.8rem}
  .flagbtn.on{color:var(--amber);border-color:var(--amber)}
  .rev-item{border-left:3px solid var(--red);padding:10px 14px;margin:10px 0;background:var(--panel2);border-radius:0 10px 10px 0}
  .rev-item .q{font-weight:600;font-size:.92rem;margin-bottom:5px}
  .rev-item .a{font-size:.85rem;color:var(--green)}
  .rev-item .ya{font-size:.85rem;color:var(--red)}
  .hide{display:none}
  small.muted{color:var(--muted)}
  a.link{color:var(--accent);cursor:pointer;text-decoration:underline}
  .kbd{font-size:.75rem;color:var(--muted);margin-top:14px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <h1>CIS – CMDB Data Foundation</h1>
  <div class="sub">Practice quiz reviewer · built from your answer-key screenshots · <span id="qtotal"></span> questions</div>

  <!-- START -->
  <div id="start" class="card">
    <div class="field">
      <label>Mode</label>
      <div class="row">
        <label class="toggle"><input type="radio" name="mode" value="all" checked> Practice all questions</label>
        <label class="toggle"><input type="radio" name="mode" value="cat"> Choose categories</label>
      </div>
    </div>
    <div id="catBox" class="field hide">
      <label>Categories</label>
      <div id="chips" class="chips"></div>
    </div>
    <div class="field">
      <label>How many questions? <small class="muted">(blank = all)</small></label>
      <input type="number" id="count" min="1" placeholder="all">
    </div>
    <div class="field">
      <label class="toggle"><input type="checkbox" id="shuffleQ" checked> Shuffle question order</label>
      <label class="toggle"><input type="checkbox" id="shuffleO" checked> Shuffle answer options</label>
      <label class="toggle"><input type="checkbox" id="instant" checked> Show right/wrong immediately (after each question)</label>
    </div>
    <button class="btn wide" onclick="start()">Start quiz →</button>
    <div id="resumeBox" class="hide" style="margin-top:14px">
      <button class="btn ghost wide" onclick="resumeWrong()">↻ Review only the <span id="wrongCount"></span> I've gotten wrong before</button>
    </div>
    <div class="kbd">Tip: press <b>1–6</b> to pick options, <b>Enter</b> to check / continue.</div>
  </div>

  <!-- QUIZ -->
  <div id="quiz" class="card hide">
    <div class="meta"><span id="counter"></span><button id="flag" class="flagbtn" onclick="toggleFlag()">⚑ Flag</button></div>
    <div class="progress"><div id="bar"></div></div>
    <div class="row" style="margin-bottom:8px"><span id="cat" class="tag"></span> <span id="typeTag"></span></div>
    <div id="qtext" class="qtext"></div>
    <div id="opts"></div>
    <div id="fb" class="feedback"></div>
    <div id="noteBox"></div>
    <div class="row" style="margin-top:16px">
      <button id="check" class="btn" onclick="check()">Check answer</button>
      <button id="next" class="btn hide" onclick="next()">Next →</button>
      <div class="spacer"></div>
      <button class="btn ghost" onclick="quitToResults()">End &amp; score</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="results" class="card hide">
    <h2 style="margin-top:0">Results</h2>
    <div class="grid" style="margin-bottom:16px">
      <div class="stat g"><div class="n" id="rCorrect">0</div><div class="l">Correct</div></div>
      <div class="stat r"><div class="n" id="rWrong">0</div><div class="l">Wrong</div></div>
    </div>
    <div id="scoreLine" class="sub" style="text-align:center;font-size:1.1rem"></div>
    <div class="row" style="margin:16px 0">
      <button id="reviewWrongBtn" class="btn" onclick="reviewWrong()">Review wrong answers →</button>
      <button class="btn ghost" onclick="location.reload()">Back to start</button>
    </div>
    <div id="reviewList"></div>
  </div>
</div>

<script>
const QUESTIONS = [{"id": 1, "type": "single", "category": "CSDM & Domains", "question": "A CMDB Architect intends to build a CMDB using CSDM guidance. Which CMDB tables will the architect use to build the CSDM sell/consume domain?", "options": ["Business Service Offering, Business Service", "Business Capability, Information Object, Business Application", "Application Service, Technology Management Service (Technical Service), Technology Management Offering (Technical Service Offering)"], "correct": [0]}, {"id": 2, "type": "single", "category": "CSDM & Domains", "question": "A Business Relationship Manager wants to implement Service Portfolio Management (SPM) and present offerings to business consumers. Which CSDM Domain does this align with?", "options": ["Service Consumption (Sell/Consume)", "Build and Integration (Build)", "Design and Planning (Design)", "Service Delivery"], "correct": [0]}, {"id": 3, "type": "single", "category": "CSDM & Domains", "question": "A Manager needs information on how to correctly establish relationships between Infrastructure CIs, Technology Management Offerings (Technical Service Offerings), and Application Services within the CMDB. Which CSDM domain would provide this information?", "options": ["Service Delivery (Manage Technical Services)", "Build and Integration (Build)", "Foundation", "Design and Planning (Design)", "Service Consumption (Sell / Consume)"], "correct": [0]}, {"id": 4, "type": "single", "category": "CSDM & Domains", "question": "A hospital has received a new CT Scanner. The inventory management team created a catalog item doctors can use to schedule patients for scans. What CSDM domain should the inventory management team map the catalog item to?", "options": ["Service Consumption (Sell/Consume)", "Design and Planning (Design)", "Build and Integration (Build)", "Service Delivery (Manage Technical Service)", "Foundation"], "correct": [0]}, {"id": 5, "type": "single", "category": "CSDM & Domains", "question": "An Enterprise Architect of a financial services company is working across the enterprise and wants to track their capabilities. Which CSDM 5 domain is used?", "options": ["Design and Planning (Design)", "Foundation", "Build and Integration (Build)", "Service Consumption (Sell/Consume)", "Service Delivery (Manage Technical)"], "correct": [0]}, {"id": 6, "type": "single", "category": "CSDM & Domains", "question": "A Platform Owner in the manufacturing industry needs to map production line monitoring systems to the appropriate CSDM domain. Which CSDM 5 domain does the Platform Owner use?", "options": ["Service Delivery (Manage Technical)", "Foundation", "Build and Integration (Build)", "Service Consumption (Sell/Consume)", "Design and Planning (Design)"], "correct": [0]}, {"id": 7, "type": "single", "category": "CSDM & Domains", "question": "A Service Portfolio Manager wants to know what Application Services their Business Service Offerings depend on. What stage of CSDM would map this relationship?", "options": ["Walk", "Fly", "Crawl", "Foundation", "Run"], "correct": [0]}, {"id": 8, "type": "single", "category": "CSDM & Domains", "question": "A Configuration Manager is planning the implementation of the CMDB. Which is the prescribed CSDM rollout order?", "options": ["Foundation, Crawl, Walk, Run, Fly", "Initiate, Plan, Execute, Deliver, Close", "Architecture, Business, Technical, Governance", "Initial, Developing, Defined, Managed"], "correct": [0]}, {"id": 9, "type": "single", "category": "CSDM & Domains", "question": "A CSDM Data Manager needs metrics on the alignment of product models, locations, and business units with best practices. Which tab in the CSDM Data Foundations Dashboard provides this information?", "options": ["Foundation", "Run", "Crawl", "Walk", "Fly"], "correct": [0]}, {"id": 10, "type": "single", "category": "CSDM & Domains", "question": "A CSDM Data Manager needs metrics on the alignment of Technology Management Services (Technical Services) and Technology Management Offerings (Technical Service Offerings) with best practices. Which tab in the CSDM Data Foundation Dashboard provides this information?", "options": ["Walk", "Crawl", "Fly", "Run"], "correct": [0]}, {"id": 11, "type": "single", "category": "CSDM & Domains", "question": "A CMDB Architect intends to populate the CMDB using CSDM guidance. Which key stakeholders should be involved in decisions regarding population of the CMDB using the CSDM Crawl Stage?", "options": ["Business Service Manager, Technology Service Owner", "Application Owner, Application Service Owner", "Customer Service Manager, Infrastructure Manager"], "correct": [0]}, {"id": 12, "type": "single", "category": "CSDM & Domains", "question": "According to the CSDM, a server team is requesting a catalog item be created for infrastructure upgrade requests. Which role is involved in initiating the request and defining requirements?", "options": ["Technology Service Owners", "Enterprise Architect", "Application Service Owners"], "correct": [0]}, {"id": 13, "type": "single", "category": "CSDM & Domains", "question": "A customer's CMDB is aligned to the CSDM Walk stage. What benefit is provided by the CMDB?", "options": ["Enables impact assessments for incident, problem, and change on Business Services", "Allows for additional stratification of the Technical team's support structure along the lines of OLAs and commitments", "Improves the implementation velocity of APM Foundation for future business application rationalization"], "correct": [0]}, {"id": 14, "type": "single", "category": "CSDM & Domains", "question": "In a company there is a need to understand the CSDM maturity level needed. Which use case requires information objects?", "options": ["The SecOps team wants to understand the operational risk in the Business Application context", "The Asset Management team wants to understand the asset life cycle compliancy in a Business Application context", "The Business Service Management team wants to understand the operational impact for their consumer parties", "The Event Operations team wants to automate their events into incident for operational actions", "The Customer Service team wants to onboard pro-active case management"], "correct": [0]}, {"id": 15, "type": "single", "category": "CSDM & Domains", "question": "A development team's application will hold customer personal data (PII and PCI) with security requirements to satisfy audits. Where in the CSDM does the team store the information used to satisfy the audits?", "options": ["Business Applications and Information Objects", "Customer Service Offerings and Databases", "Technology Management Service Offerings (Technical Service Offerings) and Dynamic CI Groups"], "correct": [0]}, {"id": 16, "type": "single", "category": "CSDM & Domains", "question": "A health organization must track regulated patient information and its relation to Business Applications. Which action does CSDM recommend to meet this goal?", "options": ["Create an Information Object to represent the patient information, and link it through a relationship to the Business Application after consulting with the Application owner", "Work with the DBA team to classify data on each database and use relationships", "Create fields on the Business Application record to mark it as containing patient information"], "correct": [0]}, {"id": 17, "type": "single", "category": "CSDM & Domains", "question": "A customer wants to model their business applications and capture different types of data that includes Personally Identifiable Information (PII). Which CMDB class needs to be leveraged to achieve this?", "options": ["Information Object", "Business Capability", "API Component", "Data Classification"], "correct": [0]}, {"id": 18, "type": "single", "category": "CSDM & Domains", "question": "A company wants to track regulatory compliance using an information object as part of the CSDM framework. What is the purpose of an information object?", "options": ["It describes the logical data to the Business Applications", "It describes data in general on a group of Configuration Items", "It describes data exchanged between an API interface and an Application"], "correct": [0]}, {"id": 19, "type": "single", "category": "CSDM & Domains", "question": "A retail organization needs incidents affecting customer-facing services resolved quickly to reduce revenue loss. Which CSDM attribute is used to prioritize these services?", "options": ["Business Criticality in the Service Offering", "Assignment Group on the CI record", "Affected CIs in the Incident record", "Service classification in the Technical Service"], "correct": [0]}, {"id": 20, "type": "single", "category": "CMDB Health Dashboard", "question": "A CMDB Administrator would like to minimize stale CIs in the CMDB. Which CMDB Health Dashboard scorecard displays this information?", "options": ["Correctness", "Completeness", "Compliance"], "correct": [0]}, {"id": 21, "type": "single", "category": "CMDB Health Dashboard", "question": "A CMDB Administrator needs to track which CIs and CI classes are missing key data. Which CMDB Health Dashboard scorecard supports tracking this requirement?", "options": ["Completeness", "Compliance", "Correctness"], "correct": [0]}, {"id": 22, "type": "single", "category": "CMDB Health Dashboard", "question": "A CMDB Administrator needs to provide Duplicate CI, Orphan CI and Stale CI metrics. Which scorecard provides this information on the CMDB Health Dashboard?", "options": ["Correctness", "Compliance", "Completeness"], "correct": [0]}, {"id": 23, "type": "single", "category": "CMDB Health Dashboard", "question": "A CMDB Administrator wants to leverage the Staleness metric from the CMDB Health Dashboard - Correctness Scorecard. What is the default duration of this metric?", "options": ["30 days", "24 hours", "7 days", "60 days"], "correct": [0]}, {"id": 24, "type": "single", "category": "CMDB Health Dashboard", "question": "A CMDB Administrator wants to leverage the Staleness metric from the CMDB Health Dashboard - Correctness Scorecard. Which field is used to calculate the duration of this metric?", "options": ["Most recent discovery (last_discovery)", "Last modified on (last_modified)", "Created (sys_created_on)", "Updated (sys_updated_on)", "First discovered (first_discovered)"], "correct": [0]}, {"id": 25, "type": "single", "category": "CMDB Health Dashboard", "question": "A CMDB Manager wants to improve data quality using the CMDB Health Dashboard. What needs to happen to generate CMDB health scores?", "options": ["The scheduled jobs for the CMDB Health Dashboard must be activated", "Nothing, CMDB health scores are calculated by default", "The plugin, CMDB health calculation, needs to be installed"], "correct": [0]}, {"id": 26, "type": "single", "category": "CMDB Health Dashboard", "question": "The CMDB Administrator group wants to filter specific CI classes that display on the CMDB Health Dashboard, so only relevant data is displayed. Which feature can the group utilize?", "options": ["Health Inclusion Rules", "Data Refresh Rules", "Reconciliation Rules", "Identification Rules"], "correct": [0]}, {"id": 27, "type": "single", "category": "CMDB Health Dashboard", "question": "A Configuration Manager only sees the overall CMDB Health score and grouped by CI Class. How can the Configuration Manager get a score for regionally relevant CIs?", "options": ["Create CMDB groups with type, health, by region", "Customize the CMDB Health Dashboard scheduled jobs to group the results by region", "On the CMDB health settings, activate the option, Group scores by region"], "correct": [0]}, {"id": 28, "type": "single", "category": "CMDB Health Dashboard", "question": "On the Correctness Scorecard for the Server class (60,000 servers): Duplicate metric shows 59,000/60,000 evaluated; Orphan metric shows 45,000/50,000. Which configuration explains the difference in scope (60,000 vs 50,000)?", "options": ["The Orphan metric has a Health Inclusion rule configured for the Server class", "The Orphan metric has a CMDB Group configured for the Server class", "The Duplicate metric has a Health Inclusion rule configured for the Server class", "The Duplicate metric has a CMDB Group configured for the Server class"], "correct": [0]}, {"id": 29, "type": "single", "category": "CMDB Health Dashboard", "question": "The CMDB Administrator group wants to display meaningful results on the CMDB Health Dashboard Compliance Scorecard for server records that are not on the latest patch. What must be configured?", "options": ["Certification Policies, Data Filters, Scheduled Jobs", "Technical Service Offerings, Dynamic CI Groups, CMDB Groups", "Certification Filter, Certification Template, Audit", "Stale, Orphan, Duplicate"], "correct": [0]}, {"id": 30, "type": "multi", "category": "CMDB Health Dashboard", "question": "Configuration Management needs to ensure data quality for all CIs. What areas of data quality for CIs are in the CMDB Health Dashboard?", "options": ["Duplicate CIs", "Stale CIs", "Downgraded CIs", "Missing CIs", "Upgraded CIs"], "correct": [0, 1]}, {"id": 31, "type": "single", "category": "CMDB Health Dashboard", "question": "A CMDB Administrator opens CI Class Manager and sees the Health Inclusion Rules tab under a CI Class. How are these rules utilized by the IRE?", "options": ["To narrow the scope of CIs included in the identification process", "To reduce the data ingested into the CMDB", "To reconcile specific attributes based on data sources"], "correct": [0]}, {"id": 32, "type": "multi", "category": "Data Foundation Dashboard", "question": "A CMDB Administrator wants to leverage the CMDB Data Foundations Dashboard. What are benefits of using this application?", "options": ["Checks that important data is valid and properly configured", "Uses automation to remediate potential risks", "Has a framework to create custom metrics for the CMDB", "Provides playbooks to assist in the remediation of potential risks"], "correct": [0, 1]}, {"id": 33, "type": "multi", "category": "Data Foundation Dashboard", "question": "The CMDB Data Foundations Dashboard shows low scores for several metrics. Which actions can the CMDB Administrator take to improve the CMDB Health?", "options": ["Use the Remediation Playbooks linked beside each metric", "Focus on metric(s) with Critical and High priorities", "Remove non-operational and retired CIs", "Adjust the metrics using exclusion rules to improve the scores"], "correct": [0, 1]}, {"id": 34, "type": "single", "category": "Data Foundation Dashboard", "question": "A Configuration Manager implementing end-to-end service modeling wants help on status and playbooks for improving quality. What does the Configuration Manager reference?", "options": ["CSDM Data Foundation Dashboard", "CMDB Data Foundation Dashboard", "CMDB Workspace", "Service Mapping Data Foundation Dashboard"], "correct": [0]}, {"id": 35, "type": "single", "category": "Data Foundation Dashboard", "question": "Some hardware CIs are missing serial number information. The team needs a structured approach to identify and address these gaps. Which accomplishes this task?", "options": ["CMDB Data Foundation Playbook", "CI Class Manager", "Service Graph Connectors"], "correct": [0]}, {"id": 36, "type": "single", "category": "Data Foundation Dashboard", "question": "A CMDB Administrator wants to use the CMDB and CSDM Data Foundations Dashboard. Where can the Administrator obtain the dashboard?", "options": ["It is a free application on the ServiceNow Store", "It is a free application on the ServiceNow Innovation Lab", "It is a paid application on the ServiceNow Store", "It is active by default"], "correct": [0]}, {"id": 37, "type": "single", "category": "Data Foundation Dashboard", "question": "A CMDB Administrator knows the CMDB Data Foundation Dashboard is a resource to monitor and improve data quality. What is a benefit of this dashboard?", "options": ["Provides key health-related metrics to make decisions", "Provides the ability to configure health-related metrics", "Provides the ability to resolve certification policy tasks"], "correct": [0]}, {"id": 38, "type": "single", "category": "Data Foundation Dashboard", "question": "A CMDB Administrator needs insights into how their CMDB is configured according to ServiceNow recommended practice. Which should be used?", "options": ["CMDB Data Foundation Dashboard", "CMDB Workspace", "CMDB Health Dashboard", "CMDB Data Manager"], "correct": [0]}, {"id": 39, "type": "single", "category": "Data Foundation Dashboard", "question": "A CMDB Administrator wants to improve data quality related to the CSDM. Which action should the Administrator take?", "options": ["Use the CSDM Data Foundations Dashboard", "Use the default configured CMDB Health Dashboard", "Start the ServiceNow Health Scan"], "correct": [0]}, {"id": 40, "type": "multi", "category": "Data Foundation Dashboard", "question": "A CMDB Administrator sees an issue on the CMDB Data Foundations Dashboard and wants to run a playbook. Which types of documentation are provided in a playbook?", "options": ["Problem Analysis", "Problem Overview", "Root Cause", "Automated Remediations"], "correct": [0, 1]}, {"id": 41, "type": "multi", "category": "Data Foundation Dashboard", "question": "A CMDB Administrator is considering the playbooks provided on the CMDB Data Foundation Dashboard. What are benefits supporting this decision?", "options": ["Offers remediation templates to improve poorly performing metrics", "Offers remediation options to address and improve poorly performing metrics", "Offers insight into the downstream impacts of poorly performing metrics", "Offers automated scripts to resolve poorly performing metrics"], "correct": [0, 1]}, {"id": 42, "type": "single", "category": "Data Foundation Dashboard", "question": "A CMDB Administrator reviewing the CMDB Data Foundations Dashboard sees ServiceNow offers Remediation Play information about services, helping to align incidents with the status and history of services"]], "distractors": []}, {"id": 186, "type": "match", "category": "Governance & General", "question": "Transitioning from status attributes in the CMDB to life cycle objects. Drag and drop the objects/attributes to the description.", "pairs": [["life_cycle_mapping", "This table is pre-populated with mappings for legacy status values, based on its table, to the best-fit CSDM life-cycle value pair"], ["life_cycle_stage", "A record attribute that reflects a meta-level state of the record life cycle"], ["life_cycle_stage_status", "A record attribute that reflects a sub-level state of the record life cycle"], ["life_cycle_object", "This table uses the type of CI (hardware, document, logical, etc.) to determine which sub-level life cycle state values are available"]], "distractors": []}];
const LS = 'cisdf_quiz_v1';
// Safe storage: use localStorage when available, else fall back to in-memory
let _mem = {};
const safeStore = {
  get(k){ try{ return localStorage.getItem(k); }catch(e){ return _mem[k]||null; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(e){ _mem[k]=v; } }
};
let store = {};
try{ store = JSON.parse(safeStore.get(LS) || '{}'); }catch(e){ store = {}; }
if(!store.wrongIds) store.wrongIds = [];
function save(){ safeStore.set(LS, JSON.stringify(store)); }

document.getElementById('qtotal').textContent = QUESTIONS.length;

// categories
const cats = [...new Set(QUESTIONS.map(q=>q.category))].sort();
const chipsEl = document.getElementById('chips');
cats.forEach(c=>{
  const d=document.createElement('div'); d.className='chip on'; d.textContent=c+' ('+QUESTIONS.filter(q=>q.category===c).length+')';
  d.dataset.cat=c; d.onclick=()=>{d.classList.toggle('on')}; chipsEl.appendChild(d);
});
document.querySelectorAll('input[name=mode]').forEach(r=>r.onchange=()=>{
  document.getElementById('catBox').classList.toggle('hide', document.querySelector('input[name=mode]:checked').value!=='cat');
});
if(store.wrongIds.length){
  document.getElementById('resumeBox').classList.remove('hide');
  document.getElementById('wrongCount').textContent = store.wrongIds.length;
}

let session=null;
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function buildPool(){
  const mode=document.querySelector('input[name=mode]:checked').value;
  let pool=QUESTIONS.slice();
  if(mode==='cat'){
    const on=[...document.querySelectorAll('.chip.on')].map(c=>c.dataset.cat);
    pool=pool.filter(q=>on.includes(q.category));
  }
  if(document.getElementById('shuffleQ').checked) pool=shuffle(pool);
  const n=parseInt(document.getElementById('count').value);
  if(n && n>0) pool=pool.slice(0,n);
  return pool;
}

function start(){
  const pool=buildPool();
  if(!pool.length){alert('No questions match that selection.');return;}
  session={pool, i:0, correct:0, wrong:0, results:[], instant:document.getElementById('instant').checked,
           shuffleO:document.getElementById('shuffleO').checked, flags:new Set()};
  show('quiz'); render();
}
function resumeWrong(){
  const pool=QUESTIONS.filter(q=>store.wrongIds.includes(q.id));
  session={pool:shuffle(pool), i:0, correct:0, wrong:0, results:[], instant:true, shuffleO:true, flags:new Set()};
  show('quiz'); render();
}
function show(id){['start','quiz','results'].forEach(x=>document.getElementById(x).classList.toggle('hide',x!==id));}

let cur, curOrder, answered;
function render(){
  answered=false;
  cur=session.pool[session.i];
  document.getElementById('counter').textContent=`Question ${session.i+1} of ${session.pool.length}`;
  document.getElementById('bar').style.width=((session.i)/session.pool.length*100)+'%';
  document.getElementById('cat').textContent=cur.category;
  const tt=document.getElementById('typeTag');
  if(cur.type==='multi'){tt.className='tag multi';tt.textContent='Select all that apply';}
  else if(cur.type==='match'){tt.className='tag match';tt.textContent='Matching';}
  else {tt.className='tag';tt.textContent='Single answer';}
  document.getElementById('qtext').textContent=cur.question;
  const flagBtn=document.getElementById('flag');
  flagBtn.classList.toggle('on',session.flags.has(cur.id));
  const fb=document.getElementById('fb'); fb.className='feedback'; fb.innerHTML='';
  document.getElementById('noteBox').innerHTML='';
  document.getElementById('check').classList.remove('hide');
  document.getElementById('next').classList.add('hide');
  const opts=document.getElementById('opts'); opts.innerHTML='';

  if(cur.type==='match'){
    // build dropdowns
    const rights = cur.pairs.map(p=>p[1]).concat(cur.distractors||[]);
    curOrder = shuffle(rights);
    cur.pairs.forEach((p,idx)=>{
      const row=document.createElement('div'); row.className='matchrow'; row.dataset.idx=idx;
      const l=document.createElement('div'); l.className='left'; l.textContent=p[0]; row.appendChild(l);
      const sel=document.createElement('select'); sel.className='match';
      sel.innerHTML='<option value="">— choose —</option>'+curOrder.map(r=>`<option value="${encodeURIComponent(r)}">${r}</option>`).join('');
      row.appendChild(sel); opts.appendChild(row);
    });
  } else {
    curOrder = cur.options.map((o,idx)=>({o,idx}));
    if(session.shuffleO) curOrder=shuffle(curOrder);
    const input = cur.type==='multi'?'checkbox':'radio';
    curOrder.forEach((item,pos)=>{
      const lab=document.createElement('label'); lab.className='opt'; lab.dataset.idx=item.idx;
      lab.innerHTML=`<input type="${input}" name="opt" value="${item.idx}"><span class="optltr">${String.fromCharCode(65+pos)}</span><span>${item.o}</span>`;
      lab.querySelector('input').onchange=()=>{
        if(input==='radio') document.querySelectorAll('#opts label').forEach(l=>l.classList.remove('sel'));
        lab.classList.toggle('sel', lab.querySelector('input').checked);
      };
      opts.appendChild(lab);
    });
  }
}

function toggleFlag(){
  if(session.flags.has(cur.id))session.flags.delete(cur.id); else session.flags.add(cur.id);
  document.getElementById('flag').classList.toggle('on',session.flags.has(cur.id));
}

function check(){
  if(answered) return;
  let correct;
  if(cur.type==='match'){
    const rows=[...document.querySelectorAll('.matchrow')];
    if(rows.some(r=>!r.querySelector('select').value)){ if(!confirm('Some items are unmatched. Check anyway?')) return; }
    correct=true;
    rows.forEach(r=>{
      const idx=+r.dataset.idx; const chosen=decodeURIComponent(r.querySelector('select').value||'');
      const right=cur.pairs[idx][1]; const ok=chosen===right;
      if(!ok) correct=false;
      r.classList.add(ok?'correct':'wrong');
      r.querySelector('select').disabled=true;
      const a=document.createElement('div'); a.className='matchans';
      a.innerHTML = ok ? '✓ Correct' : '✗ Correct answer: <b>'+right+'</b>';
      r.appendChild(a);
    });
  } else {
    const picked=[...document.querySelectorAll('#opts input:checked')].map(i=>+i.value).sort((a,b)=>a-b);
    if(!picked.length){alert('Pick an answer first.');return;}
    const right=cur.correct.slice().sort((a,b)=>a-b);
    correct = picked.length===right.length && picked.every((v,k)=>v===right[k]);
    document.querySelectorAll('#opts label').forEach(lab=>{
      const idx=+lab.dataset.idx; const inp=lab.querySelector('input'); inp.disabled=true;
      if(cur.correct.includes(idx)) lab.classList.add('correct');
      else if(inp.checked) lab.classList.add('wrong');
    });
  }
  answered=true;
  session.results.push({id:cur.id, correct});
  if(correct){session.correct++; store.wrongIds=store.wrongIds.filter(x=>x!==cur.id);}
  else {session.wrong++; if(!store.wrongIds.includes(cur.id)) store.wrongIds.push(cur.id);}
  save();

  const fb=document.getElementById('fb');
  if(session.instant){
    fb.className='feedback show '+(correct?'ok':'no');
    fb.innerHTML='<b>'+(correct?'✓ Correct':'✗ Not quite')+'</b>'+
      (cur.type!=='match'?('Correct: '+cur.correct.map(i=>cur.options[i]).join('  •  ')):'');
  }
  if(cur.note){
    document.getElementById('noteBox').innerHTML='<div class="note">⚠ '+cur.note+'</div>';
  }
  document.getElementById('check').classList.add('hide');
  const nx=document.getElementById('next'); nx.classList.remove('hide');
  nx.textContent = session.i+1>=session.pool.length ? 'See results →' : 'Next →';
}

function next(){
  session.i++;
  if(session.i>=session.pool.length){ showResults(); return; }
  document.getElementById('bar').style.width=((session.i)/session.pool.length*100)+'%';
  render();
}
function quitToResults(){ if(confirm('End the quiz and see your score so far?')) showResults(); }

function showResults(){
  show('results');
  document.getElementById('rCorrect').textContent=session.correct;
  document.getElementById('rWrong').textContent=session.wrong;
  const done=session.correct+session.wrong;
  const pct=done?Math.round(session.correct/done*100):0;
  document.getElementById('scoreLine').innerHTML=`You scored <b style="color:var(--text)">${pct}%</b> (${session.correct}/${done}).`;
  document.getElementById('reviewList').innerHTML='';
  const wrong=session.results.filter(r=>!r.correct);
  document.getElementById('reviewWrongBtn').classList.toggle('hide', wrong.length===0);
}

function reviewWrong(){
  const wrongIds=session.results.filter(r=>!r.correct).map(r=>r.id);
  const list=document.getElementById('reviewList');
  list.innerHTML='<h3>Questions you missed</h3>';
  wrongIds.forEach(id=>{
    const q=QUESTIONS.find(x=>x.id===id);
    const d=document.createElement('div'); d.className='rev-item';
    let ans;
    if(q.type==='match') ans=q.pairs.map(p=>p[0]+' → '+p[1]).join('<br>');
    else ans=q.correct.map(i=>q.options[i]).join('  •  ');
    d.innerHTML=`<div class="q">${q.question}</div><div class="a">✓ ${ans}</div>`+
      (q.note?`<div class="note">⚠ ${q.note}</div>`:'');
    list.appendChild(d);
  });
  const b=document.createElement('button'); b.className='btn wide'; b.style.marginTop='14px';
  b.textContent='↻ Retry these '+wrongIds.length+' questions';
  b.onclick=()=>{ session={pool:shuffle(QUESTIONS.filter(q=>wrongIds.includes(q.id))),i:0,correct:0,wrong:0,results:[],instant:true,shuffleO:true,flags:new Set()}; show('quiz'); render(); };
  list.appendChild(b);
  list.scrollIntoView({behavior:'smooth'});
}

// keyboard
document.addEventListener('keydown',e=>{
  if(document.getElementById('quiz').classList.contains('hide'))return;
  if(e.key==='Enter'){ if(answered) next(); else check(); e.preventDefault(); }
  else if(/^[1-6]$/.test(e.key) && !answered && cur.type!=='match'){
    const labs=document.querySelectorAll('#opts label'); const idx=+e.key-1;
    if(labs[idx]){const inp=labs[idx].querySelector('input'); inp.checked=!inp.checked; inp.dispatchEvent(new Event('change'));}
  }
});
</script>
</body>
</html>
